name: Arduino Compile to UF2

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies
        run: |
          pip3 install pyserial

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52@1.7.0 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code (Force Global Flags)
        run: |
          REAL_FQBN="adafruit:nrf52:itsybitsy52840"
          
          # Der absolute Pfad zu den S340-Dateien
          SOFTDEVICE_INC="$HOME/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/cores/nRF5/nordic/softdevice/s340_nrf52_6.1.1_API/include"
          
          # Wir bauen ein felsenfestes Flag-Paket: Board-Identität + ANT+ Pfad
          GLOBAL_FLAGS="-DNRF52840_XXAA -DBOARD_PCA10056 -DSOFTDEVICE_PRESENT -DS340 -DARDUINO_NRF52840_ITSYBITSY -DUSB_VID=0x239A -DUSB_PID=0x8026 -I$SOFTDEVICE_INC"
          
          echo "Kompiliere für: $REAL_FQBN"
          
          arduino-cli compile --fqbn "$REAL_FQBN" \
            --build-property "build.extra_flags=$GLOBAL_FLAGS" \
            --output-dir ./build ./ANT2.ino

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
