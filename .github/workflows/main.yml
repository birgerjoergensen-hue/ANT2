name: Arduino Compile to UF2

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies
        run: |
          pip3 install pyserial

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52@1.7.0 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code (Include ANT+ Headers)
        run: |
          # Wir nutzen wieder die saubere Basis-FQBN für das ItsyBitsy
          REAL_FQBN="adafruit:nrf52:itsybitsy52840"
          
          # Pfad zu den Nordic-SoftDevice-Dateien im installierten Core
          SOFTDEVICE_INC="$HOME/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/cores/nRF5/nordic/softdevice/s340_nrf52_6.1.1_API/include"
          
          echo "Kompiliere für: $REAL_FQBN"
          echo "Binde ANT+ Pfad ein: $SOFTDEVICE_INC"
          
          # Wir übergeben die ANT-Makros UND den Suchpfad zu den Headern, ohne die Board-Flags anzurühren
          arduino-cli compile --fqbn "$REAL_FQBN" \
            --build-property "compiler.cpp.extra_flags=-DSOFTDEVICE_PRESENT -DS340 -I$SOFTDEVICE_INC" \
            --build-property "compiler.c.extra_flags=-DSOFTDEVICE_PRESENT -DS340 -I$SOFTDEVICE_INC" \
            --output-dir ./build ./ANT2.ino

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
