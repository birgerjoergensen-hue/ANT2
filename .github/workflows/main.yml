name: BLIPBOX-31v35-Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: System Tooling installieren
        run: |
          pip3 install adafruit-nrfutil
          # Pfad in den PATH exportieren
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - uses: arduino/setup-arduino-cli@v2
      
      - name: Board Installation
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .

      - name: UF2 Erstellung
        run: |
          VERSION=$(date +%Y-%m-%d-%H%M)
          TOOL_PATH="/home/runner/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/tools/uf2conv/uf2conv.py"
          python3 $TOOL_PATH -f 0xada52840 -c -o ./build/ANT2-$VERSION.uf2 ./build/*.hex

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ANT2-Firmware-Versioniert
          path: ./build/ANT2-*.uf2
