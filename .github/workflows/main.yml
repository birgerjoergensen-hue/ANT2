name: Arduino Compile to UF2

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies
        run: |
          pip3 install pyserial

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code (Auto-Detect Board)
        run: |
          # 1. Wir suchen in der Liste aller installierten Boards automatisch nach dem "itsybitsy" Eintrag
          REAL_FQBN=$(arduino-cli board listall adafruit:nrf52 | grep -i "itsybitsy" | awk '{print $NF}' | head -n 1)
          
          # Falls er "itsybitsy" nicht findet, nehmen wir als Backup einfach das erste nRF52840 Board aus der Liste
          if [ -z "$REAL_FQBN" ]; then
            REAL_FQBN=$(arduino-cli board listall adafruit:nrf52 | grep -i "840" | awk '{print $NF}' | head -n 1)
          fi
          
          echo "Erkanntes Board (FQBN): $REAL_FQBN"
          
          # 2. Wir starten den Compiler mit der automatisch gefundenen FQBN
          arduino-cli compile --fqbn "$REAL_FQBN" --libraries "$HOME/.arduino15/packages/adafruit/hardware/nrf52" --output-dir ./build ./ANT2.ino

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
