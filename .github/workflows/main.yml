name: Arduino Compile to UF2

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies
        run: |
          pip3 install pyserial

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          # Wir installieren exakt die Version 1.7.0, die du nutzt
          arduino-cli core install adafruit:nrf52@1.7.0 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code (With ANT+ SoftDevice)
        run: |
          # FQBN ermitteln
          REAL_FQBN=$(arduino-cli board listall adafruit:nrf52 | grep -i "itsybitsy" | awk '{print $NF}' | head -n 1)
          echo "Kompiliere für: $REAL_FQBN"
          
          # Wir übergeben dem Compiler die Flags, damit er die ANT+ Befehle (sd_ant_...) freischaltet
          arduino-cli compile --fqbn "$REAL_FQBN" \
            --build-property "build.extra_flags=-DSOFTDEVICE_PRESENT -DS340" \
            --libraries "$HOME/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/libraries" \
            --output-dir ./build ./ANT2.ino

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
