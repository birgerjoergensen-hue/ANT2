name: Arduino Build

on: [push, workflow_dispatch]

env:
  # Unterdrückt die Node.js Warnungen für den Moment
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Board und Tools installieren
        run: |
          pip install adafruit-nrfutil
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Kompilieren
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .

      - name: Vorbereitung für Upload
        run: |
          # Wir schauen nach, was wirklich gebaut wurde
          ls -R ./build
          # Falls keine uf2 da ist, kopieren wir alles, damit wir sehen, was da ist
          # In der Regel liegt hier eine .hex oder .bin Datei
          
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: firmware-dateien
          path: ./build/*

          - name: Kompilieren und in UF2 wandeln
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .
          # Hier ist der Automatisierungsschritt:
          # Wir suchen die .hex Datei und konvertieren sie sofort
          /home/runner/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/tools/uf2conv/uf2conv.py -f 0xada52840 -c -o ./build/firmware.uf2 ./build/*.hex
