name: Arduino Compile to UF2

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies
        run: |
          pip3 install pyserial

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52@1.7.0 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code (With S340 SoftDevice)
        run: |
          # 1. Wir hängen die SoftDevice-Option s340 direkt an die FQBN an
          # Das aktiviert den ANT+-Stack sauber im Arduino-System, ohne die MCU-Definitionen zu zerstören
          FULL_BOARD_FQBN="adafruit:nrf52:itsybitsy52840:softdevice=s340"
          echo "Kompiliere mit Konfiguration: $FULL_BOARD_FQBN"
          
          # 2. Wir nutzen compiler.cpp.extra_flags, um das ANT-Makro sicher hinzuzufügen
          arduino-cli compile --fqbn "$FULL_BOARD_FQBN" \
            --build-property "compiler.cpp.extra_flags=-DSOFTDEVICE_PRESENT -DS340" \
            --output-dir ./build ./ANT2.ino

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
