name: Arduino Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Board installieren
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Kompilieren
        # --build-property sorgt dafür, dass die Signatur-Tools nicht aufgerufen werden
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --build-property recipe.hooks.objcopy.postlink.1.pattern= --output-dir ./build .

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./build/
