name: Arduino Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Board und Tools installieren
        run: |
          pip install adafruit-nrfutil
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Kompilieren mit UF2 Export
        # Wir lassen die cli das .uf2 File direkt mitbauen
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .
          # Suchen der erzeugten Datei und in firmware.uf2 umbenennen
          mv ./build/*.uf2 ./build/firmware.uf2 || echo "Keine UF2 gefunden, prüfe Build-Log"

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./build/firmware.uf2
