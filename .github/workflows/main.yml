name: Arduino Build und Verpackung

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Erlaubt es dir, den Build auch manuell auf GitHub zu starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Arduino CLI einrichten
        uses: arduino/setup-arduino-cli@v2

      - name: Adafruit Board-Manager hinzufügen und installieren
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Sketch kompilieren
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build ./ANT2

      - name: Fertige Firmware als ZIP bereitstellen (Automatisches Hochzählen)
        uses: actions/upload-artifact@v4
        with:
          # Nutzt die GitHub-Laufnummer, damit der Download nie wieder gleich heißt!
          name: blipbox-build-${{ github.run_number }}-firmware
          path: ./build/
