name: Arduino Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Tools installieren
        run: |
          pip install adafruit-nrfutil
          # WICHTIG: Das Tool muss für die CLI erreichbar sein
          sudo ln -s /home/runner/.local/bin/adafruit-nrfutil /usr/local/bin/adafruit-nrfutil

      - name: Board installieren
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Kompilieren
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./build/
