name: Arduino Build

on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Install Tooling
        run: |
          pip3 install adafruit-nrfutil
          sudo ln -s $(which adafruit-nrfutil) /usr/loc#include <Arduino.h>

void setup() {
  // LED Status setzen
  pinMode(LED_BLUE, OUTPUT);
  pinMode(LED_RED, OUTPUT);
  
  // Blaue LED hart aus
  digitalWrite(LED_BLUE, LOW);
  
  // Rote LED an für 2 Sekunden als Start-Signal
  digitalWrite(LED_RED, HIGH);
  delay(2000);
  digitalWrite(LED_RED, LOW);
  
  // Ab hier würde der ANT-Stack initialisiert
  // Da wir Bluefruit.h entfernen, stürzt das Radio-Modul nicht mehr ab.
}

void loop() {
  // Wenn das Board jetzt stabil bleibt (kein blaues Blinken mehr),
  // wissen wir, dass der Bootloader-Absturz behoben ist.
  delay(1000);
}al/bin/adafruit-nrfutil
          
      - name: Board Installation
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --output-dir ./build .

      - name: Versionierte UF2 Erstellung
        run: |
          # Zeitstempel generieren (Format: JJJJ-MM-TT-HHMM)
          VERSION=$(date +%Y-%m-%d-%H%M)
          TOOL_PATH="/home/runner/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/tools/uf2conv/uf2conv.py"
          # Dateiname mit Version versehen
          python3 $TOOL_PATH -f 0xada52840 -c -o ./build/ANT2-$VERSION.uf2 ./build/*.hex

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ANT2-Firmware-Versioniert
          path: ./build/ANT2-*.uf2
