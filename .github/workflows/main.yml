name: Arduino Compile to UF2 (nice!nano BLE)

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Python Dependencies & Adafruit Tools
        run: |
          pip3 install pyserial adafruit-nrfutil

      - name: Install nRF52 Board Core
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52@1.7.0 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Compile Code & Convert to UF2
        run: |
          REAL_FQBN="adafruit:nrf52:feather52840sense"
          
          # Sauberer Standard-Build ohne riskante ANT-Flags
          arduino-cli compile --fqbn "$REAL_FQBN" --output-dir ./build ./ANT2.ino
          
          # Konvertierung zu UF2
          ADAFRUIT_UF2_SCRIPT="$HOME/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/tools/uf2conv/uf2conv.py"
          python3 "$ADAFRUIT_UF2_SCRIPT" ./build/ANT2.ino.hex -c -f 0xada52840 -o ./build/ANT2.ino.uf2

      - name: Upload UF2 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: blipbox-v4-firmware
          path: ./build/
