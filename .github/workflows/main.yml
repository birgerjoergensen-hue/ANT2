name: Arduino Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      
      - name: Board installieren
        run: |
          arduino-cli core update-index --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core install adafruit:nrf52 --additional-urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json

      - name: Kompilieren ohne Signierung
        # Wir setzen die Post-Link-Pattern leer, damit nrfutil ignoriert wird
        run: |
          arduino-cli compile --fqbn adafruit:nrf52:feather52840sense --build-property recipe.hooks.objcopy.postlink.1.pattern= --output-dir ./build .

      - name: Manuelle UF2 Erstellung
        run: |
          # Wir nutzen das im Core enthaltene Tool ohne externe Abhängigkeit
          TOOL_PATH="/home/runner/.arduino15/packages/adafruit/hardware/nrf52/1.7.0/tools/uf2conv/uf2conv.py"
          python3 $TOOL_PATH -f 0xada52840 -c -o ./build/firmware.uf2 ./build/*.hex

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: firmware-fertig
          path: ./build/firmware.uf2
